
name: SEO Audit

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      baseUrl:
        description: "Base URL for SEO audit"
        required: false
        default: ""

jobs:
  seo-audit:
    name: SEO Technical & Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SEO audit
        env:
          SEO_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.baseUrl || vars.SEO_SITE_URL }}
        run: npm run seo:check

      - name: Run Lighthouse
        env:
          SEO_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.baseUrl || vars.SEO_SITE_URL }}
          LH_PERFORMANCE_MIN: "0.75"
          LH_SEO_MIN: "0.90"
        continue-on-error: false
        run: npm run seo:lighthouse

      - name: Upload SEO artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-audit-${{ github.run_id }}
          path: results/*.json
          retention-days: 30

